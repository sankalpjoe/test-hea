model-settings:
  device: cpu
  model-name: ViT-B/32
  prediction-threshold: 0.23
people-counter-settings:
  enabled: true
  model: yolov8m.pt
  pose-model: yolov8n-pose.pt
  confidence: 0.25
  imgsz: 1280
  iou: 0.35
  crowd-alert-threshold: 30
  device: cpu
video-settings:
  inference-every-n-frames: 5
video-sources:
- id: 0
  name: Internal Webcam
  source: 0
- id: 1
  name: CCTV - Entrance
  source: wss://77.291.09.77/camera/stream
logging-settings:
  interval-minutes: 5
  incident-cooldown-seconds: 30
  log-dir: logs
scenario-settings:
  mode: office
  min-keypoints: 4
  temporal-frames: 15
  static-learn-frames: 150
  crush-density-threshold: 8
  panic-velocity-threshold: 25
  sahi:
    enabled: false
    slice-height: 640
    slice-width: 640
    overlap-ratio: 0.2
  perspective-scale:
    bands:
    - y-min: 0.0
      y-max: 0.33
      min-height-px: 30
      max-height-px: 120
    - y-min: 0.33
      y-max: 0.66
      min-height-px: 60
      max-height-px: 240
    - y-min: 0.66
      y-max: 1.0
      min-height-px: 100
      max-height-px: 480
zones:
  excluded: []
  restricted: []
